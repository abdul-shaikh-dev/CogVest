appId: com.abdulshaikh.cogvest
---
- launchApp:
    clearState: true
- openLink: "cogvest:///add-holding"
- tapOn:
    id: "asset-input"
- inputText: "Reliance Industries"
- tapOn:
    id: "symbol-input"
- inputText: "RELIANCE"
- tapOn:
    id: "ticker-input"
- inputText: "RELIANCE.NS"
- tapOn:
    id: "quantity-input"
- inputText: "2"
- tapOn:
    id: "price-input"
- inputText: "100"
- hideKeyboard
- scrollUntilVisible:
    element:
      id: "review-trade-button"
    direction: DOWN
- tapOn:
    id: "review-trade-button"
- assertVisible: "Derived preview"
- scrollUntilVisible:
    element:
      id: "save-trade-button"
    direction: DOWN
- tapOn:
    id: "save-trade-button"
- tapOn:
    id: "tab-holdings"
- assertVisible:
    id: "holdings-screen"
- assertVisible: "Reliance Industries"
- assertVisible: "Qty 2"
