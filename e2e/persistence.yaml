appId: com.abdulshaikh.cogvest
---
- launchApp:
    clearState: true
- tapOn:
    id: "tab-cash"
- tapOn:
    id: "cash-amount-input"
- inputText: "1000"
- tapOn:
    id: "cash-label-input"
- inputText: "Broker cash"
- tapOn:
    id: "cash-date-input"
- inputText: "2026-04-20"
- hideKeyboard
- tapOn:
    id: "save-cash-entry-button"
- assertVisible: "Broker cash"
- stopApp
- launchApp
- tapOn:
    id: "tab-cash"
- assertVisible: "Broker cash"
