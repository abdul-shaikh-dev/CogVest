appId: com.abdulshaikh.cogvest
---
- launchApp:
    clearState: true
- assertVisible:
    id: "dashboard-screen"
- tapOn:
    id: "tab-cash"
- assertVisible:
    id: "cash-screen"
- tapOn:
    id: "cash-amount-input"
- inputText: "1000"
- hideKeyboard
- tapOn:
    id: "cash-label-input"
- inputText: "Broker cash"
- hideKeyboard
- tapOn:
    id: "cash-date-input"
- assertVisible: "OK"
- tapOn: "OK"
- scrollUntilVisible:
    element:
      id: "save-cash-entry-button"
    direction: DOWN
- doubleTapOn:
    id: "save-cash-entry-button"
- assertVisible: "Broker cash"
- assertVisible: "₹1,000.00"
- assertNotVisible: "₹2,000.00"
- runScript:
    file: scripts/current-local-date.js
- assertVisible: "${output.currentLocalDate}"
- scrollUntilVisible:
    element:
      text: "Tap to review or correct"
    direction: DOWN
- tapOn: "Tap to review or correct"
- assertVisible:
    id: "review-cash-entry-screen"
- scrollUntilVisible:
    element:
      id: "delete-cash-entry-button"
    direction: DOWN
- tapOn:
    id: "delete-cash-entry-button"
- assertVisible: "Delete this cash entry?"
- scrollUntilVisible:
    element:
      id: "confirm-delete-cash-entry-button"
    direction: DOWN
- tapOn:
    id: "confirm-delete-cash-entry-button"
- assertVisible:
    id: "cash-screen"
- assertNotVisible: "Tap to review or correct"
- assertVisible: "No cash movement yet"
